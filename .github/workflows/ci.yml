name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Install Playwright
        run: playwright install chromium

      - name: Verify imports
        run: |
          python -c "from src.config import Config"
          python -c "from src.scenario import parse_scenario, validate_scenario"
          python -c "from src.tts import create_tts_client, get_wav_duration_ms"
          python -c "from src.assembler import Assembler"
          python -c "from src.narrator import Narrator"
          python -c "from src.browser import BrowserEngine"
          python -c "from src.recorder import Recorder"
          python -c "from src.cli import cli"
          echo "All imports OK"

      - name: Validate all example scenarios
        run: |
          for f in examples/*.json examples/templates/*.json; do
            echo "Validating $f..."
            python -m src validate "$f"
          done

      - name: Run unit tests
        run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check syntax
        run: python -m py_compile src/*.py
