# Example: Generate a demo video in CI
#
# This workflow shows how to use NeuraScreen in a GitHub Actions pipeline.
# It validates a scenario and generates a video (without TTS narration).
#
# To generate with narration, add TTS_API_KEY to your repository secrets
# and change "run" to "full".

name: Generate Demo Video

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario file path'
        required: true
        default: 'examples/01-simple-navigation.json'

permissions:
  contents: read

jobs:
  generate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Install package
        run: |
          pip install -e .
          playwright install chromium

      - name: Configure
        run: |
          cp .env.example .env
          echo "APP_URL=${{ vars.APP_URL }}" >> .env

      - name: Validate scenario
        run: neurascreen validate ${{ github.event.inputs.scenario }}

      - name: Generate video
        run: neurascreen run ${{ github.event.inputs.scenario }}

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: demo-video
          path: output/*.mp4
          retention-days: 7
